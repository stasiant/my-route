<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>My Route</title>
    <script src="https://telegram.org/js/telegram-web-app_v3.js?v=2026-03-03-final-no-test"></script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      
      <!-- WELCOME -->
      <section id="screenWelcome">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div style="font-weight:bold;">My Route</div>
            <button id="langToggle" class="ios-link">RU</button>
        </div>
        
        <h1 class="large-title">Путешествия.<br>Переосмысление.</h1>
        <p class="subtitle">Ваш персональный редактор путешествий создаст идеальную историю поездки.</p>
        
        <button id="btnStart" class="ios-btn">Начать</button>
      </section>

      <!-- FORM -->
      <section id="screenForm" class="hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <button id="backBtn" class="ios-link">Отмена</button>
            <div style="font-weight:600;">Параметры</div>
            <div style="width:50px;"></div>
        </div>

        <div class="section-header">МАРШРУТ</div>
        <div class="ios-group">
            <div class="ios-row">
                <span class="ios-label">Куда</span>
                <input id="destination" class="ios-input" placeholder="Париж" />
            </div>
            <div class="ios-row">
                <span class="ios-label">Дней</span>
                <input id="days" type="number" class="ios-input" placeholder="3" />
            </div>
        </div>

        <div class="section-header">УСЛОВИЯ</div>
        <div class="ios-group">
            <!-- БЮДЖЕТ -->
            <div class="ios-row">
                <span class="ios-label">Бюджет</span>
                <select id="budget" class="ios-input ios-select">
                    <option value="economy">Эконом</option>
                    <option value="medium" selected>Средний</option>
                    <option value="high">Высокий</option>
                    <option value="premium">Премиум</option>
                </select>
            </div>
            <!-- КОМПАНИЯ -->
            <div class="ios-row">
                <span class="ios-label">Кто едет</span>
                <select id="companions" class="ios-input ios-select">
                    <option value="solo">Один</option>
                    <option value="couple" selected>Пара</option>
                    <option value="family">Семья (3-4)</option>
                    <option value="group">Компания</option>
                </select>
            </div>
        </div>

        <div class="section-header">ДЕТАЛИ</div>
        <div class="ios-group">
            <div class="ios-row">
                <textarea id="notes" class="ios-input" style="text-align:left;" placeholder="Напишите подробно: люблю музеи, азиатскую кухню, не люблю долгие переходы..."></textarea>
            </div>
        </div>

        <button id="btnGen" class="ios-btn">Создать историю</button>
      </section>

      <!-- RESULT -->
      <section id="screenResult" class="hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <h2 style="margin:0; font-size:24px;">Ваш гид</h2>
            <button id="newBtn" class="ios-link">Готово</button>
        </div>

        <div class="book-view">
            <div id="summary" class="book-intro"></div>
            <div id="bookBody" class="article-content"></div>
        </div>
      </section>

    </main>
    <script src="./app_v3.js?v=2026-03-03-final-no-test"></script>
  </body>
</html>
