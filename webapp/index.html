<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>My Route - Путеводитель</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      
      <!-- Экран формы -->
      <section id="screenForm" class="screen">
        <header class="header">
          <div class="logo">MR</div>
          <h1 class="app-title">Создать маршрут</h1>
        </header>

        <div class="form-group">
          <label>Куда едем?</label>
          <input id="destination" type="text" placeholder="Например: Москва, Россия" />
        </div>

        <div class="row">
          <div class="form-group">
            <label>Дней</label>
            <input id="days" type="number" min="1" placeholder="3" />
          </div>
          <div class="form-group">
            <label>Ночей</label>
            <input id="nights" type="number" min="0" placeholder="2" />
          </div>
        </div>

        <div class="form-group">
          <label>Бюджет</label>
          <select id="budget">
            <option value="low">Эконом</option>
            <option value="medium" selected>Средний</option>
            <option value="high">Комфорт</option>
          </select>
        </div>

        <div class="form-group">
          <label>Темп</label>
          <select id="pace">
            <option value="slow">Расслабленный</option>
            <option value="normal" selected>Обычный</option>
            <option value="fast">Насыщенный</option>
          </select>
        </div>

        <div class="form-group">
          <label>Компания</label>
          <select id="companions">
            <option value="solo">Я один</option>
            <option value="couple" selected>Пара</option>
            <option value="family">Семья</option>
            <option value="group">Друзья</option>
          </select>
        </div>

        <div class="form-group">
          <label>Особые пожелания</label>
          <textarea id="notes" rows="3" placeholder="Что вы любите? (архитектура, природа, еда...)"></textarea>
        </div>

        <button id="generateBtn" class="btn-primary">Сгенерировать путеводитель</button>
      </section>

      <!-- Экран результата (Статья) -->
      <section id="screenResult" class="screen hidden">
        <button id="backBtn" class="btn-secondary">← Новый маршрут</button>
        
        <div class="article-content">
          <h1 id="articleTitle" class="article-main-title">Ваш маршрут</h1>
          <p id="articleSummary" class="article-summary"></p>
          
          <div id="guideContent"></div>
        </div>
      </section>

    </main>
    <script src="./app.js"></script>
  </body>
</html>
