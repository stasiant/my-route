<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>My Route</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="./styles.css?v=APPLE_FORM" />
  </head>
  <body>
    <!-- ЭКРАН ПРИВЕТСТВИЯ -->
    <section id="screenWelcome" class="welcome-screen">
      <div class="welcome-overlay"></div>
      <div class="welcome-content">
        <header class="welcome-header">
            <div class="welcome-logo">My Route</div>
            <button id="langToggle" class="welcome-lang">RU</button>
        </header>
        <div class="welcome-text-block">
            <h1 class="welcome-title">Путешествие — это разговор с миром, который отвечает тебе впечатлениями.</h1>
            <p class="welcome-subtitle">Ваш персональный редактор путешествий создаст идеальную историю поездки.</p>
            <button id="btnStart" class="welcome-btn">Начать</button>
        </div>
      </div>
    </section>

    <!-- ОСНОВНОЕ ПРИЛОЖЕНИЕ -->
    <main class="container">
      
      <!-- ЭКРАН ФОРМЫ (НОВЫЙ ДИЗАЙН) -->
      <section id="screenForm" class="hidden">
        
        <h1 class="page-title">Параметры</h1>

        <!-- МАРШРУТ -->
        <div class="section-header">МАРШРУТ</div>
        <div class="ios-group">
            <div class="ios-row">
                <div class="row-left">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                    <span class="ios-label">Куда</span>
                </div>
                <input id="destination" class="ios-input-pill" placeholder="Париж" />
            </div>
            <div class="ios-row">
                <div class="row-left">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                    <span class="ios-label">Дней</span>
                </div>
                <input id="days" type="number" class="ios-input-pill input-small" placeholder="3" />
            </div>
        </div>

        <!-- УСЛОВИЯ -->
        <div class="section-header">УСЛОВИЯ</div>
        <div class="ios-group">
            <div class="ios-row">
                <div class="row-left">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"></path><path d="M4 6v12c0 1.1.9 2 2 2h14v-4"></path><path d="M18 12a2 2 0 0 0-2 2c0 1.1.9 2 2 2h4v-4h-4z"></path></svg>
                    <span class="ios-label">Бюджет</span>
                </div>
                <select id="budget" class="ios-select">
                    <option value="economy">Эконом</option>
                    <option value="medium" selected>Средний</option>
                    <option value="high">Высокий</option>
                    <option value="premium">Премиум</option>
                </select>
            </div>
            <div class="ios-row">
                <div class="row-left">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                    <span class="ios-label">Кто едет</span>
                </div>
                <select id="companions" class="ios-select">
                    <option value="solo">Один</option>
                    <option value="couple" selected>Пара</option>
                    <option value="family">Семья (3-4)</option>
                    <option value="group">Компания</option>
                </select>
            </div>
        </div>

        <!-- ДЕТАЛИ -->
        <div class="section-header">ДЕТАЛИ</div>
        <div class="ios-group">
            <div class="ios-row align-top">
                <div class="icon-wrap">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                </div>
                <textarea id="notes" class="ios-textarea" placeholder="Напишите подробно..."></textarea>
            </div>
        </div>

        <button id="btnGen" class="pill-btn">Создать историю</button>
      </section>

      <!-- RESULT -->
      <section id="screenResult" class="hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <h2 style="margin:0; font-size:24px; font-family:'Georgia', serif;">Ваш гид</h2>
            <button id="newBtn" class="ios-link">Новый</button>
        </div>

        <div class="book-view">
            <div id="summary" class="book-intro"></div>
            <div id="bookBody" class="article-content"></div>
        </div>

        <button id="htmlSaveBtn" class="pill-btn" style="margin-bottom: 40px;">
            📥 Сохранить в чат
        </button>
      </section>
    </main>

    <script>
    const tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }

    const API_BASE = "https://my-route-api.onrender.com";
    const i18n = {
      ru: { loading: "Строится...", btnGen: "Создать историю", err: "Ошибка генерации" },
      en: { loading: "Building...", btnGen: "Write Guide", err: "Generation error" }
    };
    let lang = "ru";
    let currentRouteHTML = "";

    function show(id) {
        document.getElementById("screenWelcome").classList.add("hidden");
        document.getElementById("screenForm").classList.add("hidden");
        document.getElementById("screenResult").classList.add("hidden");
        document.getElementById(id).classList.remove("hidden");
        window.scrollTo(0,0);
    }

    function formatForTelegram(html) {
      let text = html.replace(/<h2>(.*?)<\/h2>/gi, "\n\n<b>===== $1 =====</b>\n");
      text = text.replace(/<h3>(.*?)<\/h3>/gi, "\n\n<b>🗓 $1</b>\n").replace(/<b>(.*?)<\/b>/gi, "<b>$1</b>");
      return text.replace(/<i>(.*?)<\/i>/gi, "<i>$1</i>").replace(/<p>/gi, "").replace(/<\/p>/gi, "\n").replace(/<br>/gi, "\n").trim();
    }

    async function generate() {
      const btn = document.getElementById("btnGen");
      const dest = document.getElementById("destination").value;
      const days = document.getElementById("days").value;
      if(!dest || !days) return alert("Заполните город и дни");
      
      btn.disabled = true; btn.textContent = i18n[lang].loading;
      
      try {
        const res = await fetch(`${API_BASE}/route/generate`, {
          method: "POST", headers: {"Content-Type": "application/json"},
          body: JSON.stringify({
            language: lang, destination: dest, days: parseInt(days),
            budget: document.getElementById("budget").value, pace: "normal", 
            companions: document.getElementById("companions").value, interests: [],
            notes: document.getElementById("notes").value
          })
        });
        const data = await res.json();
        let html = data.html_content || "";
        
        if (!html && data.daily_plan) {
            data.daily_plan.forEach(d => {
                html += `<h3>День ${d.day}</h3>`;
                const items = [...(d.morning||[]), ...(d.afternoon||[]), ...(d.evening||[])];
                items.forEach(it => html += `<p>${it}</p>`);
            });
        }
        
        currentRouteHTML = `<b>Маршрут: ${dest} (${days} дн.)</b>\n\n` + html;
        
        document.getElementById("summary").textContent = data.summary || `Ваш маршрут по ${dest}`;
        document.getElementById("bookBody").innerHTML = html;
        
        show("screenResult");
      } catch(e) {
        alert(i18n[lang].err);
      } finally {
        btn.disabled = false; btn.textContent = i18n[lang].btnGen;
      }
    }

    document.getElementById("btnStart").onclick = () => show("screenForm");
    document.getElementById("newBtn").onclick = () => show("screenForm");
    document.getElementById("btnGen").onclick = generate;
    
    document.getElementById("langToggle").onclick = (e) => {
        lang = lang === "ru" ? "en" : "ru"; 
        e.target.textContent = lang.toUpperCase();
    };
    
    document.getElementById("htmlSaveBtn").onclick = function() {
        if (!currentRouteHTML) return;
        if (tg) {
            tg.sendData(formatForTelegram(currentRouteHTML));
        } else {
            alert("Тестовая среда: " + formatForTelegram(currentRouteHTML));
        }
    };
    </script>
  </body>
</html>
