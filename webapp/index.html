<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>My Route</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <div class="brand">
          <div class="logo">MR</div>
          <div class="title">My Route</div>
        </div>
        <div class="lang">
          <button class="chip active" id="btnRu">RU</button>
          <button class="chip" id="btnEn">EN</button>
        </div>
      </header>

      <section class="card" id="screenWelcome">
        <h1>Трэвел-блогер</h1>
        <p class="muted">Я напишу подробную историю вашего путешествия.</p>
        <button class="primary" id="startBtn">Создать</button>
      </section>

      <section class="card hidden" id="screenForm">
        <div class="row"><h2>Параметры</h2><button class="link" id="backBtn">Назад</button></div>
        <label class="field"><span class="label">Куда?</span><input id="destination" class="input" placeholder="Рим" /></label>
        <div class="grid2">
          <label class="field"><span class="label">Дней</span><input id="days" class="input" type="number" placeholder="3" /></label>
          <label class="field"><span class="label">Бюджет</span><select id="budget" class="input"><option value="medium">Средний</option><option value="high">Высокий</option></select></label>
        </div>
        <label class="field"><span class="label">Пожелания</span><textarea id="notes" class="input" rows="3"></textarea></label>
        <button class="primary" id="generateBtn">Сгенерировать</button>
      </section>

      <section class="card hidden" id="screenResult">
        <div class="row"><h2 id="resultTitle">История</h2><button class="link" id="newBtn">Новый</button></div>
        <div class="resultBlock"><div class="muted" id="resultSummary"></div></div>
        <div class="resultBlock"><div id="guide"></div></div>
      </section>
    </main>
    <!-- ДОБАВИЛ ВЕРСИЮ v=3 ЧТОБЫ СБРОСИТЬ КЭШ -->
    <script src="./app.js?v=3"></script>
  </body>
</html>
