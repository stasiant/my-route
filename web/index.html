<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>My Route</title>

    <!-- Leaflet/Telegram и стили -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body>
    <main class="container">
      <header class="header">
        <div class="brand">
          <div class="logo">MR</div>
          <div>
            <div class="title">My Route</div>
            <div class="subtitle" id="subtitle"></div>
          </div>
        </div>

        <div class="lang">
          <button class="chip" id="btnRu" type="button">RU</button>
          <button class="chip" id="btnEn" type="button">EN</button>
        </div>
      </header>

      <section class="card" id="screenWelcome">
        <h1 id="welcomeTitle"></h1>
        <p id="welcomeText" class="muted"></p>

        <ul class="list" id="featureList"></ul>

        <button class="primary" id="startBtn" type="button"></button>
        <p class="fineprint" id="priceNote"></p>
      </section>

      <section class="card hidden" id="screenForm">
        <div class="row">
          <h2 id="formTitle" class="h2"></h2>
          <button class="link" id="backBtn" type="button"></button>
        </div>

        <label class="field">
          <span class="label" id="lblDestination"></span>
          <input id="destination" class="input" placeholder="e.g., Paris, France" />
        </label>

        <div class="grid2">
          <label class="field">
            <span class="label" id="lblDays"></span>
            <input id="days" class="input" type="number" min="1" step="1" placeholder="3" />
          </label>

          <label class="field">
            <span class="label" id="lblNights"></span>
            <input id="nights" class="input" type="number" min="0" step="1" placeholder="2 (optional)" />
          </label>
        </div>

        <label class="field">
          <span class="label" id="lblBudget"></span>
          <select id="budget" class="input">
            <option value="low" id="optBudgetLow"></option>
            <option value="medium" id="optBudgetMed"></option>
            <option value="high" id="optBudgetHigh"></option>
            <option value="premium" id="optBudgetPremium"></option>
          </select>
        </label>

        <div class="field">
          <span class="label" id="lblInterests"></span>
          <div class="chips" id="interests"></div>
        </div>

        <label class="field">
          <span class="label" id="lblPace"></span>
          <select id="pace" class="input">
            <option value="slow" id="optPaceSlow"></option>
            <option value="normal" id="optPaceNormal"></option>
            <option value="fast" id="optPaceFast"></option>
          </select>
        </label>

        <label class="field">
          <span class="label" id="lblCompanions"></span>
          <select id="companions" class="input">
            <option value="solo" id="optCompSolo"></option>
            <option value="couple" id="optCompCouple"></option>
            <option value="family" id="optCompFamily"></option>
            <option value="group" id="optCompGroup"></option>
          </select>
        </label>

        <label class="field">
          <span class="label" id="lblNotes"></span>
          <textarea id="notes" class="input textarea" rows="4" placeholder=""></textarea>
          <div class="helper" id="notesHelper"></div>
        </label>

        <button class="primary" id="generateBtn" type="button"></button>
        <p class="fineprint" id="formHint"></p>
      </section>

      <!-- Ваш новый единый вывод: текст маршрута + точки внизу -->
      <section class="card hidden" id="screenResult">
        <div class="row">
          <h2 class="h2" id="resultTitle"></h2>
          <button class="link" id="newBtn" type="button"></button>
        </div>

        <div class="resultBlock">
          <div class="muted" id="resultSummary"></div>
        </div>

        <!-- Единый текст маршрута -->
        <div class="resultBlock">
          <h3 class="h3" id="guideTitle"></h3>
          <div id="guide" class="guideText"></div>
        </div>

        <!-- Точки внизу (список) -->
        <div class="resultBlock">
          <h3 class="h3" id="pointsTitle"></h3>
          <ol class="list" id="pointsList"></ol>
        </div>
      </section>
    </main>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""></script>

    <script src="./app.js"></script>
  </body>
</html>
